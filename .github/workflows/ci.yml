name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: tickeasy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tickeasy_test
      DB_USER: testuser
      DB_PASSWORD: testpassword
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-integration-test-secret-not-for-production' }}
      JWT_EXPIRES_DAY: 7d
      DB_URL: https://placeholder.supabase.co
      DB_ANON_KEY: placeholder
      EMAILER_USER: placeholder@example.com
      EMAILER_OAUTH_REFRESH_TOKEN: placeholder
      GOOGLE_OAUTH_CLIENT_ID: placeholder
      GOOGLE_OAUTH_CLIENT_SECRET: placeholder
      GOOGLE_OAUTH_CALLBACK_URL: http://localhost:3000/api/v1/auth/google/callback
      FRONTEND_URL: http://localhost:3001
      MERCHANTID: placeholder
      HASHKEY: placeholder
      HASHIV: placeholder
      HOST: http://localhost:3000
      REDIRECTURL: http://localhost:3001/payment/result
      CLEANUP_TEMP_IMAGES_HOURS: 24
      CLEANUP_INTERVAL_HOURS: 6
      OPENAI_API_KEY: placeholder

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Run migrations
        run: npm run migrate
      - run: npm test

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: always()
    steps:
      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          title: "CI — ${{ github.repository }}"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Lint:** ${{ needs.lint.result }}
            **Build:** ${{ needs.build.result }}
            **Test:** ${{ needs.test.result }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
